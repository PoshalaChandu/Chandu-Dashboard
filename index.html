<!DOCTYPE html>
<html>
<head>
    <title>NMS Dashboard</title>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

    <style>
        body {
            font-family: Arial;
            margin: 0;
            background: #eef2f7;
        }

        /* LOGIN */
        .login {
            width: 300px;
            margin: 120px auto;
            padding: 20px;
            background: white;
            box-shadow: 0 0 10px gray;
            border-radius: 10px;
        }

        input, select {
            width: 100%;
            padding: 10px;
            margin-top: 10px;
        }

        button {
            padding: 10px;
            width: 100%;
            margin-top: 10px;
            background: #007bff;
            color: white;
            border: none;
        }

        /* DASHBOARD */
        .dashboard {
            display: none;
        }

        .header {
            background: #1f2d3d;
            color: white;
            padding: 15px;
            font-size: 18px;
        }

        .controls {
            padding: 10px;
            background: white;
            display: flex;
            gap: 10px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
        }

        th {
            background: #007bff;
            color: white;
        }

        th, td {
            border: 1px solid #ccc;
            padding: 8px;
            text-align: center;
        }

        .completed { background: #28a745; color: white; }
        .pending { background: #dc3545; color: white; }
    </style>
</head>

<body>

<!-- LOGIN -->
<div class="login" id="loginPage">
    <h3>Login</h3>
    <input type="text" id="user" placeholder="Username">
    <input type="password" id="pass" placeholder="Password">
    <button onclick="login()">Login</button>
</div>

<!-- DASHBOARD -->
<div class="dashboard" id="dashboard">

    <div class="header">
        🚆 NMS Dashboard - Chandu
    </div>

    <div class="controls">
        <select id="sheetSelect" onchange="displayData()"></select>
        <input type="text" id="search" placeholder="Search..." onkeyup="displayData()">
    </div>

    <table id="table">
        <thead></thead>
        <tbody></tbody>
    </table>

</div>

<script>
const USER = "admin";
const PASS = "1234";

let workbook;

function login() {
    let u = document.getElementById("user").value;
    let p = document.getElementById("pass").value;

    if (u === USER && p === PASS) {
        document.getElementById("loginPage").style.display = "none";
        document.getElementById("dashboard").style.display = "block";
        loadExcel();
    } else {
        alert("Invalid Login");
    }
}

// Load Excel Automatically
function loadExcel() {
    fetch("data.xlsx")
        .then(res => res.arrayBuffer())
        .then(data => {
            workbook = XLSX.read(data, { type: "array" });

            let select = document.getElementById("sheetSelect");
            select.innerHTML = "";

            workbook.SheetNames.forEach(name => {
                select.innerHTML += `<option value="${name}">${name}</option>`;
            });

            displayData();
        });
}

// Display Data
function displayData() {
    let sheetName = document.getElementById("sheetSelect").value;
    let search = document.getElementById("search").value.toLowerCase();

    let sheet = workbook.Sheets[sheetName];
    let data = XLSX.utils.sheet_to_json(sheet, { header: 1 });

    let thead = document.querySelector("#table thead");
    let tbody = document.querySelector("#table tbody");

    thead.innerHTML = "";
    tbody.innerHTML = "";

    // Header
    let header = "<tr>";
    data[0].forEach(col => header += `<th>${col}</th>`);
    header += "</tr>";
    thead.innerHTML = header;

    // Rows
    for (let i = 1; i < data.length; i++) {
        let rowData = data[i].join(" ").toLowerCase();

        if (rowData.includes(search)) {
            let row = "<tr>";

            data[i].forEach(cell => {
                let cls = "";

                if (cell && cell.toString().toLowerCase().includes("complete")) {
                    cls = "completed";
                } else if (cell && cell.toString().toLowerCase().includes("pending")) {
                    cls = "pending";
                }

                row += `<td class="${cls}">${cell || ""}</td>`;
            });

            row += "</tr>";
            tbody.innerHTML += row;
        }
    }
}
</script>

</body>
</html>
