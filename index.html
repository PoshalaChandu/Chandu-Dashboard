<!DOCTYPE html>
<html>
<head>
    <title>NMS Dashboard</title>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        body { margin:0; font-family: Arial; background:#eef2f7; }

        .login {
            width:300px; margin:120px auto; padding:20px;
            background:white; box-shadow:0 0 10px gray;
        }

        input, select {
            padding:10px; width:100%; margin-top:10px;
        }

        button {
            padding:10px; width:100%; margin-top:10px;
            background:#007bff; color:white; border:none;
        }

        .dashboard { display:none; }

        .header {
            background:#1f2d3d; color:white;
            padding:15px; font-size:18px;
        }

        .controls {
            display:flex; gap:10px;
            padding:10px; background:white;
        }

        table {
            width:100%; border-collapse:collapse;
            background:white;
        }

        th { background:#007bff; color:white; }
        th, td { padding:8px; border:1px solid #ccc; text-align:center; }

        .completed { background:#28a745; color:white; }
        .pending { background:#dc3545; color:white; }
        .progress { background:#ffc107; }

        .chart-box {
            width:300px; margin:20px auto;
        }
    </style>
</head>

<body>

<!-- LOGIN -->
<div class="login" id="loginPage">
    <h3>Login</h3>
    <input type="text" id="user" placeholder="Username">
    <input type="password" id="pass" placeholder="Password">
    <button onclick="login()">Login</button>
</div>

<!-- DASHBOARD -->
<div class="dashboard" id="dashboard">

    <div class="header">🚆 NMS Dashboard - Chandu</div>

    <div class="controls">
    <select id="fileSelect" onchange="loadExcel()">
        <option value="data.xlsx">Main Data</option>
        <option value="data2.xlsx">Second Data</option>
    </select>

    <!-- EXISTING -->
    <select id="sheetSelect" onchange="displayData()"></select>

    <input type="text" id="search" placeholder="Search..." onkeyup="displayData()">

</div>

    <div class="chart-box">
        <canvas id="chart"></canvas>
    </div>

    <table id="table">
        <thead></thead>
        <tbody></tbody>
    </table>

</div>

<script>
const USER = "chandu";
const PASS = "464946";

let workbook;
let chart;

function login() {
    let u = document.getElementById("user").value;
    let p = document.getElementById("pass").value;

    if (u === USER && p === PASS) {
        document.getElementById("loginPage").style.display = "none";
        document.getElementById("dashboard").style.display = "block";
        loadExcel();
    } else {
        alert("Invalid Login");
    }
}

function loadExcel() {

    let fileName = document.getElementById("fileSelect").value;

    fetch("./" + fileName)
    .then(res => res.arrayBuffer())
    .then(data => {
        workbook = XLSX.read(data, { type: "array" });

        let select = document.getElementById("sheetSelect");
        select.innerHTML = "";

        workbook.SheetNames.forEach(name => {
            select.innerHTML += `<option value="${name}">${name}</option>`;
        });

        displayData();
    });
}

function displayData() {
    let sheetName = document.getElementById("sheetSelect").value;
    let search = document.getElementById("search").value.toLowerCase();

    let sheet = workbook.Sheets[sheetName];
    let data = XLSX.utils.sheet_to_json(sheet, { header: 1 });

    let thead = document.querySelector("#table thead");
    let tbody = document.querySelector("#table tbody");

    thead.innerHTML = "";
    tbody.innerHTML = "";

    let completed=0, pending=0, progress=0;

    // Header
    let header = "<tr>";
    data[0].forEach(col => header += `<th>${col}</th>`);
    header += "</tr>";
    thead.innerHTML = header;

    for (let i=1; i<data.length; i++) {
        let rowText = data[i].join(" ").toLowerCase();

        if (rowText.includes(search)) {

            let row = "<tr>";

            data[i].forEach(cell => {
                let cls="";

                if(cell){
                    let val = cell.toString().toLowerCase();

                    if(val.includes("complete")) { cls="completed"; completed++; }
                    else if(val.includes("pending")) { cls="pending"; pending++; }
                    else if(val.includes("progress")) { cls="progress"; progress++; }
                }

                row += `<td class="${cls}">${cell || ""}</td>`;
            });

            row += "</tr>";
            tbody.innerHTML += row;
        }
    }

    drawChart(completed, pending, progress);
}

function drawChart(c, p, pr) {

    if(chart) chart.destroy();

    let ctx = document.getElementById("chart");

    chart = new Chart(ctx, {
        type: 'pie',
        data: {
            labels: ["Completed", "Pending", "In Progress"],
            datasets: [{
                data: [c, p, pr]
            }]
        }
    });
}
</script>

</body>
</html>
