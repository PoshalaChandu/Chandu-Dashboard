<!DOCTYPE html>
<html>
<head>
    <title>NMS Dashboard</title>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        body { margin:0; font-family: Arial; background:#eef2f7; }

        .login {
            width:300px; margin:120px auto; padding:20px;
            background:white; box-shadow:0 0 10px gray;
        }

        input, select {
            padding:10px; width:100%; margin-top:10px;
        }

        button {
            padding:10px; width:100%; margin-top:10px;
            background:#007bff; color:white; border:none;
        }

        .dashboard { display:none; }

        .header {
            background:#1f2d3d; color:white;
            padding:15px; font-size:18px;
        }

        .controls {
            <input type="file" id="fileInput" multiple accept=".xlsx" onchange="loadMultipleExcel()">
            display:flex; gap:10px;
            padding:10px; background:white;
        }

        table {
            width:100%; border-collapse:collapse;
            background:white;
        }

        th { background:#007bff; color:white; }
        th, td { padding:8px; border:1px solid #ccc; text-align:center; }

        .completed { background:#28a745; color:white; }
        .pending { background:#dc3545; color:white; }
        .progress { background:#ffc107; }

        .chart-box {
            width:300px; margin:20px auto;
        }
    </style>
</head>

<body>

<!-- LOGIN -->
<div class="login" id="loginPage">
    <h3>Login</h3>
    <input type="text" id="user" placeholder="Username">
    <input type="password" id="pass" placeholder="Password">
    <button onclick="login()">Login</button>
</div>

<!-- DASHBOARD -->
<div class="dashboard" id="dashboard">

    <div class="header">🚆 NMS Dashboard - Chandu</div>

    <div class="controls">

    <!-- ✅ VISIBLE BUTTON -->
    <label style="background:#007bff;color:white;padding:8px 12px;border-radius:5px;cursor:pointer;">
        Upload Excel
        <input type="file" id="fileInput" multiple accept=".xlsx"
               onchange="loadMultipleExcel()" style="display:none;">
    </label>

    <select id="sheetSelect" onchange="displayData()"></select>

    <input type="text" id="search" placeholder="Search..." onkeyup="displayData()">

</div>
<div id="summary" style="display:flex; gap:15px; padding:10px;"></div>
    <div class="chart-box">
        <canvas id="chart"></canvas>
    </div>

    <table id="table">
        <thead></thead>
        <tbody></tbody>
    </table>

</div>

<script>
const USER = "chandu";
const PASS = "464946";

let allFilesData = [];
let chart;

function login() {
    let u = document.getElementById("user").value;
    let p = document.getElementById("pass").value;

    if (u === USER && p === PASS) {
        document.getElementById("loginPage").style.display = "none";
        document.getElementById("dashboard").style.display = "block";
        alert("Please upload Excel files");
    } else {
        alert("Invalid Login");
    }
}

// ✅ LOAD LOCAL EXCEL
function loadMultipleExcel() {

    let files = document.getElementById("fileInput").files;

    allFilesData = [];
    let loaded = 0;

    for (let i = 0; i < files.length; i++) {

        let reader = new FileReader();
        let fileName = files[i].name;

        reader.onload = function(e) {

            let data = new Uint8Array(e.target.result);
            let wb = XLSX.read(data, { type: "array" });

            wb.SheetNames.forEach(sheetName => {

                let sheet = wb.Sheets[sheetName];

                let json = XLSX.utils.sheet_to_json(sheet, {
                    header: 1,
                    defval: ""
                });

                allFilesData.push({
                    name: fileName + " - " + sheetName,
                    data: json
                });
            });

            loaded++;

            if (loaded === files.length) {
                displayAllFiles();  // 🔥 IMPORTANT
            }
        };

        reader.readAsArrayBuffer(files[i]);
    }
}


// ✅ CHART
function drawChart(c, p, pr) {

    if(chart) chart.destroy();

    let ctx = document.getElementById("chart");

    chart = new Chart(ctx, {
        type: 'pie',
        data: {
            labels: ["Completed", "Pending", "In Progress"],
            datasets: [{
                data: [c, p, pr]
            }]
        }
    });
}
    function displayAllFiles() {

    let container = document.getElementById("table").parentElement;
    container.innerHTML = "";

    allFilesData.forEach(file => {

        let title = `<h3 style="padding:10px;background:#1f2d3d;color:white;">
                        ${file.name}
                     </h3>`;

        let tableHTML = `<table><thead></thead><tbody></tbody></table>`;

        container.innerHTML += title + tableHTML;

        renderTable(file.data);
    });
}

function renderTable(data) {

    let tables = document.querySelectorAll("table");
    let table = tables[tables.length - 1];

    let thead = table.querySelector("thead");
    let tbody = table.querySelector("tbody");

    let completed=0, pending=0, progress=0;

    let header = "<tr>";
    data[0].forEach(col => header += `<th>${col}</th>`);
    header += "</tr>";
    thead.innerHTML = header;

    for (let i=1; i<data.length; i++) {

        let row = "<tr>";

        data[i].forEach(cell => {

            let cls="";
            let value = cell || "";

            if(value){
                let val = value.toString().toLowerCase();

                if(val.includes("complete")) { cls="completed"; completed++; }
                else if(val.includes("pending")) { cls="pending"; pending++; }
                else if(val.includes("progress")) { cls="progress"; progress++; }
            }

            row += `<td class="${cls}">${value}</td>`;
        });

        row += "</tr>";
        tbody.innerHTML += row;
    }

    updateSummary(completed, pending, progress, data.length-1);
}

function updateSummary(c, p, pr, total) {

    let summary = document.getElementById("summary");

    summary.innerHTML = `
        <div style="background:#007bff;color:white;padding:10px;">Total: ${total}</div>
        <div style="background:#28a745;color:white;padding:10px;">Completed: ${c}</div>
        <div style="background:#dc3545;color:white;padding:10px;">Pending: ${p}</div>
        <div style="background:#ffc107;padding:10px;">Progress: ${pr}</div>
    `;
}
</script>

</body>
</html>
