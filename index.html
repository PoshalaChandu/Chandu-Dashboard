<!DOCTYPE html>
<html>
<head>
<title>NMS Dashboard</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body { margin:0; font-family: Arial; background:#eef2f7; }

.login {
    width:300px; margin:120px auto; padding:20px;
    background:white; box-shadow:0 0 10px gray;
}

input, select { padding:8px; margin:5px; }

button {
    padding:10px; width:100%; margin-top:10px;
    background:#007bff; color:white; border:none;
}

.dashboard { display:none; }

.header {
    background:#1f2d3d; color:white;
    padding:15px; font-size:18px;
}

.controls {
    display:flex; flex-wrap:wrap; gap:10px;
    padding:10px; background:white;
}

table {
    width:100%; border-collapse:collapse;
    background:white;
}

th { background:#1f2d3d; color:white; }
th, td { padding:8px; border:1px solid #ccc; text-align:center; }

.completed { background:#28a745; color:white; }
.pending { background:#dc3545; color:white; }
.progress { background:#ffc107; }

.chart-box { width:300px; margin:20px auto; }

#summary div {
    min-width:120px;
    text-align:center;
    font-weight:bold;
    border-radius:5px;
}
</style>
</head>

<body>

<div class="login" id="loginPage">
<h3>Login</h3>
<input type="text" id="user" placeholder="Username">
<input type="password" id="pass" placeholder="Password">
<button onclick="login()">Login</button>
</div>

<div class="dashboard" id="dashboard">

<div class="header">🚆 NMS Dashboard - Chandu</div>

<div class="controls">

<label style="background:#007bff;color:white;padding:8px 12px;border-radius:5px;cursor:pointer;">
Upload Excel
<input type="file" id="fileInput" multiple accept=".xlsx"
onchange="loadMultipleExcel()" style="display:none;">
</label>

<input type="text" id="search" placeholder="Search..." onkeyup="displayData()">

<select id="columnFilter" onchange="displayData()"></select>

<input type="date" id="fromDate" onchange="displayData()">
<input type="date" id="toDate" onchange="displayData()">

</div>

<div id="fileNames" style="padding:10px;"></div>

<div id="summary" style="display:flex; gap:15px; padding:10px;"></div>

<div class="chart-box">
<canvas id="chart"></canvas>
</div>

<table id="table">
<thead></thead>
<tbody></tbody>
</table>

</div>

<script>
const USER="chandu";
const PASS="464946";

let tableData=[];
let chart;
let uploadedFiles=[];

function login(){
let u=document.getElementById("user").value;
let p=document.getElementById("pass").value;

if(u===USER && p===PASS){
document.getElementById("loginPage").style.display="none";
document.getElementById("dashboard").style.display="block";
}
else alert("Invalid Login");
}

// LOAD EXCEL
function loadMultipleExcel(){

let files=document.getElementById("fileInput").files;

tableData=[];
uploadedFiles=[];

let loaded=0;

for(let i=0;i<files.length;i++){

uploadedFiles.push(files[i].name);

let reader=new FileReader();

reader.onload=function(e){

let data=new Uint8Array(e.target.result);
let wb=XLSX.read(data,{type:"array"});

wb.SheetNames.forEach(name=>{

let sheet=wb.Sheets[name];

let json=XLSX.utils.sheet_to_json(sheet,{header:1,defval:""});

if(json.length>0){
if(tableData.length===0){
tableData=json;
}else{
tableData=tableData.concat(json.slice(1));
}
}

});

loaded++;

if(loaded===files.length){
setupColumnFilter();
displayData();

// show file names
document.getElementById("fileNames").innerHTML =
"Files: " + uploadedFiles.join(", ");
}
};

reader.readAsArrayBuffer(files[i]);
}
}

// COLUMN FILTER
function setupColumnFilter(){
let select=document.getElementById("columnFilter");
select.innerHTML="";

if(!tableData[0]) return;

tableData[0].forEach((col,i)=>{
select.innerHTML+=`<option value="${i}">${col}</option>`;
});
}

// DISPLAY DATA
function displayData(){

if (!tableData || tableData.length === 0) {
console.log("No data loaded");
return;
}

let searchText=document.getElementById("search").value.toLowerCase();
let colIndex=parseInt(document.getElementById("columnFilter").value || 0);

let fromDateVal=document.getElementById("fromDate").value;
let toDateVal=document.getElementById("toDate").value;

let fromDate=fromDateVal?new Date(fromDateVal):null;
let toDate=toDateVal?new Date(toDateVal):null;

let thead=document.querySelector("#table thead");
let tbody=document.querySelector("#table tbody");

thead.innerHTML="";
tbody.innerHTML="";

let completed=0,pending=0,progress=0;

// HEADER
let header="<tr>";
tableData[0].forEach(col=>header+=`<th>${col}</th>`);
header+="</tr>";
thead.innerHTML=header;

// ROWS
for(let i=1;i<tableData.length;i++){

let rowData=tableData[i];
let rowText=rowData.join(" ").toLowerCase();

// DATE FILTER
let passDate=true;

rowData.forEach(cell=>{
let d=new Date(cell);
if(!isNaN(d)){
if(fromDate && d<fromDate) passDate=false;
if(toDate && d>toDate) passDate=false;
}
});

if(rowText.includes(searchText) && passDate){

let row="<tr>";

rowData.forEach(cell=>{

let cls="";
let val=cell || "";

if(val){
let v=val.toString().toLowerCase();

if(v.includes("complete")){cls="completed";completed++;}
else if(v.includes("pending")){cls="pending";pending++;}
else if(v.includes("progress")){cls="progress";progress++;}
}

row+=`<td class="${cls}">${val}</td>`;
});

row+="</tr>";
tbody.innerHTML+=row;
}
}

// SUMMARY
document.getElementById("summary").innerHTML=`
<div style="background:#007bff;color:white;padding:10px;">Total: ${completed+pending+progress}</div>
<div style="background:#28a745;color:white;padding:10px;">Completed: ${completed}</div>
<div style="background:#dc3545;color:white;padding:10px;">Pending: ${pending}</div>
<div style="background:#ffc107;padding:10px;">Progress: ${progress}</div>
`;

drawChart(completed,pending,progress);
}

// CHART
function drawChart(c,p,pr){

if(chart) chart.destroy();

let ctx=document.getElementById("chart");

chart=new Chart(ctx,{
type:'pie',
data:{
labels:["Completed","Pending","In Progress"],
datasets:[{data:[c,p,pr]}]
}
});
}

// AUTO REFRESH
setInterval(()=>{
if(tableData.length>0) displayData();
},10000);

</script>

</body>
</html>
